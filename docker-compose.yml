services:
  aangan:
    build: .
    ports:
      - "8000:8000"
    environment:
      # set real values in a .env file next to this compose file
      AANGAN_ENV: ${AANGAN_ENV:-dev}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - aangan-db:/app/backend/dbdata
      - aangan-chroma:/app/backend/chroma_data
      - aangan-media:/app/backend/data
      - aangan-models:/root/.cache/huggingface
    # keep the SQLite file on the volume
    command: >
      sh -c "mkdir -p dbdata &&
             DATABASE_URL=sqlite:////app/backend/dbdata/aangan.db
             uvicorn app:app --host 0.0.0.0 --port 8000"

volumes:
  aangan-db:
  aangan-chroma:
  aangan-media:
  aangan-models:
